<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CommunityPulse — Smart NGO volunteer coordination platform. AI-powered triage, volunteer matching, and real-time community need tracking." />
    <meta name="theme-color" content="#1470f5" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💙</text></svg>" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <title>CommunityPulse — Coordinator Dashboard</title>
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        try {
          // Only initialize OneSignal if on localhost or if you've configured your production domain in the dashboard
          const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
          
          await OneSignal.init({
            appId: "74cd9573-43d4-4020-a3a6-56467d556918",
            notifyButton: {
              enable: true,
            },
            allowLocalhostAsSecureOrigin: isLocalhost,
          });
        } catch (e) {
          console.warn("OneSignal initialization failed (likely domain mismatch):", e);
        }
      });
    </script>
  </head>
  <body class="bg-surface-950 text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
